{% load i18n %}
<footer class="text-center text-white" style="background-color: #f1f1f1;">
        <style>
          /* Self-contained circles: MDB's .btn-floating clips icons when
             combined with .btn-link (overflow:hidden + broken padding). */
          .footer-social {
            display: inline-flex; align-items: center; justify-content: center;
            width: 48px; height: 48px; margin: 0 .4rem; border-radius: 50%;
            border: 1px solid #d5d9dd; background: #fff; color: #343a40;
            font-size: 1.2rem; line-height: 1; text-decoration: none;
            transition: background .15s ease, color .15s ease;
          }
          .footer-social:hover, .footer-social:focus {
            background: #343a40; color: #fff; text-decoration: none;
          }
        </style>
        <!-- Grid container -->
        <div class="container-fluid pt-4">
          <!-- Section: Links -->
          <section class="mb-4">
            <a class="text-dark mx-2" href="{% url 'olretail:about' %}">{% trans 'About Us' %}</a>
          </section>
          <!-- Section: Links -->

          <!-- Section: Social media (update hrefs when accounts exist) -->
          <section class="mb-4">
            <a class="footer-social" href="#!" aria-label="Facebook"><i class="fab fa-facebook-f" aria-hidden="true"></i></a>
            <a class="footer-social" href="#!" aria-label="Twitter"><i class="fab fa-twitter" aria-hidden="true"></i></a>
            <a class="footer-social" href="#!" aria-label="Instagram"><i class="fab fa-instagram" aria-hidden="true"></i></a>
          </section>
          <!-- Section: Social media -->

          <!-- Section: Payment methods -->
          <section class="mb-4">
            <p class="text-dark small mb-2">{% trans 'We accept' %}</p>
            <span class="text-dark mx-2"><i class="fab fa-cc-visa fa-lg mr-1" aria-hidden="true"></i>{% trans 'VISA Card' %}</span>
            <span class="text-dark mx-2"><i class="fas fa-university fa-lg mr-1" aria-hidden="true"></i>{% trans 'Bank Transfer' %}</span>
            <span class="text-dark mx-2"><i class="fas fa-mobile-alt fa-lg mr-1" aria-hidden="true"></i>{% trans 'Mobile Money' %}</span>
          </section>
          <!-- Section: Payment methods -->
        </div>
        <!-- Grid container -->
      
        <!-- Copyright -->
        <div class="text-center text-dark p-3" style="background-color: rgba(0, 0, 0, 0.2);">
          © {% now "Y" %}
          <a class="text-dark" href="/">TimorMart</a>
        </div>
        <!-- Copyright -->
</footer>
