{% extends 'shared/base.html' %}
{% load i18n %}

{% block title %}{% trans 'Password changed' %} — TimorMart{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card my-5 text-center">
        <div class="card-body p-4">
          <i class="fas fa-check-circle fa-3x text-success mb-3" aria-hidden="true"></i>
          <h1 class="h4">{% trans 'Password changed' %}</h1>
          <p class="text-muted">{% trans 'Your password has been set. You can now sign in with your new password.' %}</p>
          <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-sm">{% trans 'Sign in' %}</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
