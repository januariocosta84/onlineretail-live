
# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Lets Render provision the web service + database together from this one
# file (Dashboard -> New -> Blueprint -> point at this repo), instead of
# clicking through every setting by hand.
#
# NOTE on the free tier: the free Postgres database expires after 90 days
# and the free web service sleeps after 15 minutes of inactivity (the first
# request after sleeping takes ~30-60s to wake up). Fine for a soft-launch
# trial; upgrade both to a paid plan before a real public launch.

services:
  - type: web
    name: timormart
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    # createsuperuser --noinput reads DJANGO_SUPERUSER_USERNAME/_EMAIL/_PASSWORD
    # (Django's own built-in support, no custom code needed). The `|| true`
    # is scoped to just that one step (parens matter — without them, a real
    # migrate failure would get masked too and gunicorn would start against
    # an unmigrated DB) — it only exists to no-op once the account already
    # exists, since the free tier has no shell to run it manually.
    #
    # update_translation_fields (django-modeltranslation) copies each
    # existing row's plain name/description into name_en/description_en —
    # needed once Product became a translated model, otherwise older listings
    # show blank English fields until a seller resaves them. Idempotent (safe
    # to run on every deploy) and there's no shell on the free tier to run it
    # by hand, so it lives here instead.
    startCommand: "python manage.py migrate --noinput && python manage.py update_translation_fields olretail && (python manage.py createsuperuser --noinput || true) && gunicorn TLoretail.wsgi --log-file -"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SSL_REDIRECT
        value: "true"
      # Render assigns the real hostname (<service-name>.onrender.com) at
      # provisioning time — update these two after the first deploy, or set
      # them now if you already know your custom domain.
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: timormart-db
          property: connectionString
      # Secrets — set these in the Render dashboard after the blueprint
      # creates the service (sync: false means "don't store in this file").
      # Bootstraps your admin login (see startCommand above) — set these
      # once, then feel free to remove DJANGO_SUPERUSER_PASSWORD afterward
      # so it's not sitting in the dashboard indefinitely.
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SIMULATED_BANK_WEBHOOK_SECRET
        sync: false
      - key: BANK_SIMULATOR_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      # Outgoing email via Resend's HTTP API (see TLoretail/settings.py) —
      # not set yet = console backend (prints instead of sending, never
      # crashes). Add this whenever you're ready for real email to start
      # sending; nothing else needs to change.
      - key: RESEND_API_KEY
        sync: false
      # onboarding@resend.dev is Resend's own pre-verified sandbox sender —
      # works immediately with no setup. Switch this to a real TimorMart
      # address once a domain you own is verified with Resend (Domains ->
      # Add Domain in their dashboard) — see the note in .env.
      - key: DEFAULT_FROM_EMAIL
        value: "onboarding@resend.dev"
      # Push notifications to the mobile app (see mobile/README.md "Push
      # notifications") — not set = push is a silent no-op, nothing else
      # breaks. Base64-encoded Firebase service-account JSON key.
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false

databases:
  - name: timormart-db
    plan: free
